<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>duel.io Harness</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050c15;
        --panel: #0d1b2c;
        --border: rgba(126, 186, 255, 0.26);
        --text: #eef6ff;
        --muted: #9ab4cf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(78, 195, 255, 0.14), transparent 38%),
          linear-gradient(180deg, #07111f 0%, #03070d 100%);
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 16px;
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        background: rgba(8, 19, 34, 0.92);
        border: 1px solid var(--border);
        border-radius: 18px;
      }

      .header h1,
      .header p {
        margin: 0;
      }

      .header p {
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        min-height: 0;
      }

      .card {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 10px;
        min-height: 0;
        padding: 12px;
        background: rgba(9, 20, 35, 0.9);
        border: 1px solid var(--border);
        border-radius: 20px;
      }

      .card strong {
        letter-spacing: 0.04em;
      }

      iframe {
        width: 100%;
        height: 100%;
        min-height: 820px;
        border: 0;
        border-radius: 16px;
        background: #000;
      }

      @media (max-width: 1400px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="header">
        <div>
          <h1>duel.io Browser Harness</h1>
          <p>Two scripted browser clients sharing the same local Go server.</p>
        </div>
        <strong>Auto login + auto duel + auto movement</strong>
      </section>
      <section class="grid">
        <article class="card">
          <strong>Client A</strong>
          <iframe title="Client A" id="client-a"></iframe>
        </article>
        <article class="card">
          <strong>Client B</strong>
          <iframe title="Client B" id="client-b"></iframe>
        </article>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const suffix = String(Date.now()).slice(-6);
      const autoFire = params.get("autofire") === "0" ? "0" : "1";
      document.getElementById("client-a").src =
        `/panel.html?client=A-${suffix}&username=a-${suffix}&autoplay=1&autoduel=1&autorun=toward-center&autofire=${autoFire}&debugwire=1`;
      document.getElementById("client-b").src =
        `/panel.html?client=B-${suffix}&username=b-${suffix}&autoplay=1&autoduel=1&autorun=toward-center&autofire=${autoFire}&debugwire=1`;
    </script>
  </body>
</html>
